<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailMind — AI Email Auto Reply</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0e0e0f; --surface: #161618; --surface2: #1e1e21; --border: #2a2a2e; --accent: #c8f060; --accent2: #6cf0c0; --text: #f0efe8; --muted: #888884; --danger: #f06060; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(200,240,96,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(200,240,96,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  header { display: flex; align-items: center; gap: 1rem; margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); letter-spacing: -0.5px; }
  .logo-sub { font-size: 13px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .lang-switch { display: flex; gap: 4px; margin-left: auto; }
  .lang-switch button { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .lang-switch button.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 500; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; margin-left: 8px; flex-shrink: 0; }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
  .login-screen h2 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 0.5rem; }
  .login-screen p { color: var(--muted); font-size: 14px; margin-bottom: 2rem; line-height: 1.8; }
  .google-btn { display: flex; align-items: center; gap: 12px; padding: 14px 28px; background: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: #333; cursor: pointer; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .google-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .google-btn svg { width: 20px; height: 20px; }
  .setup-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .setup-panel h3 { font-size: 11px; font-weight: 500; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .input-group { margin-bottom: 1rem; }
  .input-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .input-group input, .input-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); }
  .input-group textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
  .toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .toggle-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 500; }
  .row { display: flex; gap: 1rem; }
  .row .input-group { flex: 1; }
  .btn { padding: 11px 24px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: #0e0e0f; }
  .btn-primary:hover { background: #d4f570; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-sm { font-size: 12px; padding: 7px 14px; }
  .user-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 1.5rem; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-email { font-size: 12px; color: var(--muted); }
  .logout-btn { margin-left: auto; font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-header h2 { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .badge { background: var(--accent); color: #0e0e0f; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
  .email-list { display: flex; flex-direction: column; gap: 10px; }
  .email-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .email-card.selected { border-color: var(--accent); }
  .email-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
  .email-avatar-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; color: var(--accent2); border: 1px solid var(--border); }
  .email-meta { flex: 1; min-width: 0; }
  .email-from { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-subject { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .email-date { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .reply-area { border-top: 1px solid var(--border); padding: 16px; display: none; }
  .reply-area.open { display: block; }
  .reply-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .reply-text { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.7; resize: vertical; min-height: 120px; outline: none; }
  .reply-text:focus { border-color: var(--accent); }
  .reply-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; padding: 1rem 0; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text); z-index: 100; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo">MailMind</span>
    <span class="logo-sub" id="txt-subtitle">AI 자동 응답</span>
    <div class="lang-switch">
      <button class="active" onclick="setUiLang('ko')">한국어</button>
      <button onclick="setUiLang('en')">English</button>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <!-- 로그인 화면 -->
  <div id="loginScreen" class="login-screen">
    <h2 id="txt-login-title">Gmail로 시작하기</h2>
    <p id="txt-login-desc">Google 계정으로 로그인하면<br>이메일을 자동으로 읽고 AI 답장을 생성해드려요.</p>
    <button class="google-btn" onclick="googleLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span id="txt-google-btn">Google로 로그인</span>
    </button>
  </div>

  <!-- 메인 화면 -->
  <div id="mainScreen" class="hidden">
    <div class="user-bar">
      <img class="user-avatar" id="userAvatar" src="" alt="" />
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="logout-btn" onclick="logout()" id="txt-logout">로그아웃</button>
    </div>

    <div class="setup-panel">
      <h3 id="txt-settings">응답 설정</h3>
      <div class="input-group">
        <label id="txt-apikey">Anthropic API 키</label>
        <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
      </div>
      <div class="row">
        <div class="input-group">
          <label id="txt-tone">응답 톤</label>
          <div class="toggle-group" id="toneGroup">
            <button class="toggle-btn active" data-val="professional" data-ko="전문적" data-en="Professional">전문적</button>
            <button class="toggle-btn" data-val="friendly" data-ko="친근한" data-en="Friendly">친근한</button>
            <button class="toggle-btn" data-val="concise" data-ko="간결한" data-en="Concise">간결한</button>
            <button class="toggle-btn" data-val="formal" data-ko="격식체" data-en="Formal">격식체</button>
          </div>
        </div>
        <div class="input-group">
          <label id="txt-replylang">응답 언어</label>
          <div class="toggle-group" id="langGroup">
            <button class="toggle-btn active" data-val="same" data-ko="수신 언어와 동일" data-en="Same as received">수신 언어와 동일</button>
            <button class="toggle-btn" data-val="ko" data-ko="한국어" data-en="Korean">한국어</button>
            <button class="toggle-btn" data-val="en" data-ko="영어" data-en="English">영어</button>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label id="txt-instructions">추가 지침 (선택)</label>
        <textarea id="instructions" placeholder="예: 이메일 끝에 항상 '감사합니다' 를 붙여주세요"></textarea>
      </div>
      <button class="btn btn-primary" onclick="fetchEmails()" id="txt-fetch">이메일 불러오기</button>
    </div>

    <div id="emailSection" class="hidden">
      <div class="section-header">
        <h2 id="txt-inbox">받은 이메일</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="badge" id="emailBadge">0</span>
          <button class="btn btn-outline btn-sm" onclick="fetchAllDrafts()" id="txt-alldraft">전체 드래프트 생성</button>
          <button class="btn btn-outline btn-sm" onclick="fetchEmails()" id="txt-refresh">새로고침</button>
        </div>
      </div>
      <div class="email-list" id="emailList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '196065069577-qptcd7gr6r45jgopeqldahub56lu8d5a.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';

let accessToken = '';
let config = { tone: 'professional', lang: 'same' };
let emails = [];
let uiLang = 'ko';

const i18n = {
  ko: {
    subtitle: 'AI 자동 응답', loginTitle: 'Gmail로 시작하기',
    loginDesc: 'Google 계정으로 로그인하면<br>이메일을 자동으로 읽고 AI 답장을 생성해드려요.',
    googleBtn: 'Google로 로그인', logout: '로그아웃', settings: '응답 설정',
    apikey: 'Anthropic API 키', tone: '응답 톤', replylang: '응답 언어',
    instructions: '추가 지침 (선택)', instructionsPlaceholder: "예: 이메일 끝에 항상 '감사합니다' 를 붙여주세요",
    fetch: '이메일 불러오기', inbox: '받은 이메일', alldraft: '전체 드래프트 생성',
    refresh: '새로고침', loading: '이메일 불러오는 중...', generating: '답장 생성 중...',
    generate: 'AI 답장 생성', regenerate: '다시 생성', savedraft: '드래프트 저장',
    draftok: '드래프트 저장 완료! Gmail 임시보관함을 확인하세요', alldraftok: '개 이메일 처리 완료!',
    nomail: '새 이메일이 없습니다', errapi: 'Anthropic API 키를 입력해주세요',
  },
  en: {
    subtitle: 'AI Auto Reply', loginTitle: 'Get started with Gmail',
    loginDesc: 'Sign in with your Google account to<br>auto-read emails and generate AI replies.',
    googleBtn: 'Sign in with Google', logout: 'Logout', settings: 'Reply Settings',
    apikey: 'Anthropic API Key', tone: 'Reply Tone', replylang: 'Reply Language',
    instructions: 'Additional Instructions (optional)', instructionsPlaceholder: "e.g. Always end with 'Best regards'",
    fetch: 'Fetch Emails', inbox: 'Inbox', alldraft: 'Generate All Drafts',
    refresh: 'Refresh', loading: 'Loading emails...', generating: 'Generating reply...',
    generate: 'Generate AI Reply', regenerate: 'Regenerate', savedraft: 'Save Draft',
    draftok: 'Draft saved! Check your Gmail drafts.', alldraftok: ' emails processed!',
    nomail: 'No new emails', errapi: 'Please enter your Anthropic API key',
  }
};

function t(key) { return i18n[uiLang][key] || key; }

function setUiLang(lang) {
  uiLang = lang;
  document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-switch button[onclick="setUiLang('${lang}')"]`).classList.add('active');
  document.getElementById('txt-subtitle').textContent = t('subtitle');
  document.getElementById('txt-login-title').textContent = t('loginTitle');
  document.getElementById('txt-login-desc').innerHTML = t('loginDesc');
  document.getElementById('txt-google-btn').textContent = t('googleBtn');
  document.getElementById('txt-logout').textContent = t('logout');
  document.getElementById('txt-settings').textContent = t('settings');
  document.getElementById('txt-apikey').textContent = t('apikey');
  document.getElementById('txt-tone').textContent = t('tone');
  document.getElementById('txt-replylang').textContent = t('replylang');
  document.getElementById('txt-instructions').textContent = t('instructions');
  document.getElementById('instructions').placeholder = t('instructionsPlaceholder');
  document.getElementById('txt-fetch').textContent = t('fetch');
  document.getElementById('txt-inbox').textContent = t('inbox');
  document.getElementById('txt-alldraft').textContent = t('alldraft');
  document.getElementById('txt-refresh').textContent = t('refresh');
  document.querySelectorAll('.toggle-btn[data-ko]').forEach(btn => { btn.textContent = btn.dataset[lang] || btn.textContent; });
  renderEmails();
}

document.querySelectorAll('.toggle-group').forEach(group => {
  group.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (group.id === 'toneGroup') config.tone = btn.dataset.val;
      if (group.id === 'langGroup') config.lang = btn.dataset.val;
    });
  });
});

function googleLogin() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: 'token',
    scope: SCOPE,
    prompt: 'select_account'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function logout() {
  accessToken = '';
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('statusDot').className = 'status-dot';
  window.location.hash = '';
}

async function getUserInfo() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } });
    const data = await res.json();
    document.getElementById('userAvatar').src = data.picture || '';
    document.getElementById('userName').textContent = data.name || '';
    document.getElementById('userEmail').textContent = data.email || '';
  } catch(e) {}
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

async function fetchEmails() {
  const apiKey = document.getElementById('anthropicKey').value.trim();
  if (!apiKey) { showToast(t('errapi'), 'error'); return; }
  document.getElementById('emailSection').classList.remove('hidden');
  document.getElementById('emailList').innerHTML = `<div class="loading"><div class="spinner"></div>${t('loading')}</div>`;
  try {
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=10&q=is:inbox newer_than:7d', { headers: { Authorization: 'Bearer ' + accessToken } });
    const data = await res.json();
    const messages = data.messages || [];
    emails = [];
    for (const m of messages.slice(0, 10)) {
      const detail = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`, { headers: { Authorization: 'Bearer ' + accessToken } });
      const d = await detail.json();
      const headers = d.payload.headers;
      emails.push({ id: m.id, subject: headers.find(h=>h.name==='Subject')?.value||'(no subject)', from: headers.find(h=>h.name==='From')?.value||'Unknown', date: headers.find(h=>h.name==='Date')?.value||'', snippet: d.snippet||'', reply: null, loading: false });
    }
    document.getElementById('emailBadge').textContent = emails.length;
    renderEmails();
  } catch(err) {
    document.getElementById('emailList').innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
  }
}

function renderEmails() {
  const list = document.getElementById('emailList');
  if (!list) return;
  if (emails.length === 0) { list.innerHTML = `<div class="empty-state"><p>${t('nomail')}</p></div>`; return; }
  list.innerHTML = emails.map((e, i) => `
    <div class="email-card" id="card-${i}">
      <div class="email-header" onclick="toggleCard(${i})">
        <div class="email-avatar-icon">${getInitial(e.from)}</div>
        <div class="email-meta">
          <div class="email-from">${escHtml(cleanEmail(e.from))}</div>
          <div class="email-subject">${escHtml(e.subject)}</div>
        </div>
        <div class="email-date">${formatDate(e.date)}</div>
      </div>
      <div class="reply-area" id="reply-${i}">
        <div class="reply-label">AI Reply</div>
        ${e.loading ? `<div class="loading"><div class="spinner"></div>${t('generating')}</div>`
          : e.reply ? `<textarea class="reply-text" id="replyText-${i}">${escHtml(e.reply)}</textarea>
            <div class="reply-actions">
              <button class="btn btn-outline btn-sm" onclick="regenerate(${i})">${t('regenerate')}</button>
              <button class="btn btn-primary btn-sm" onclick="saveDraft(${i})">${t('savedraft')}</button>
            </div>`
          : `<div style="text-align:center;padding:1rem;"><button class="btn btn-primary" onclick="generateReply(${i})">${t('generate')}</button></div>`}
      </div>
    </div>`).join('');
}

function toggleCard(i) {
  const area = document.getElementById(`reply-${i}`);
  area.classList.toggle('open');
  document.getElementById(`card-${i}`).classList.toggle('selected');
  if (area.classList.contains('open') && !emails[i].reply && !emails[i].loading) generateReply(i);
}

async function generateReply(i) {
  const e = emails[i];
  const apiKey = document.getElementById('anthropicKey').value.trim();
  emails[i].loading = true;
  renderEmails();
  document.getElementById(`reply-${i}`).classList.add('open');
  const toneMap = { professional: '전문적이고 정중한', friendly: '친근하고 따뜻한', concise: '간결하고 핵심만 담은', formal: '격식체의 공손한' };
  const langMap = { same: '이메일과 같은 언어로', ko: '한국어로', en: '영어로' };
  const prompt = `다음 이메일에 대한 답장을 작성해주세요.\n발신자: ${e.from}\n제목: ${e.subject}\n내용: ${e.snippet}\n요구사항:\n- 톤: ${toneMap[config.tone]}\n- 언어: ${langMap[config.lang]}\n${document.getElementById('instructions').value ? '- 추가 지침: ' + document.getElementById('instructions').value : ''}\n답장만 작성해주세요.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    emails[i].reply = data.content?.[0]?.text || '생성 실패';
  } catch(err) { emails[i].reply = '오류: ' + err.message; }
  emails[i].loading = false;
  renderEmails();
  document.getElementById(`reply-${i}`).classList.add('open');
}

async function regenerate(i) { emails[i].reply = null; await generateReply(i); }

async function saveDraft(i) {
  const e = emails[i];
  const replyText = document.getElementById(`replyText-${i}`)?.value || e.reply;
  const fromEmail = e.from.match(/<(.+)>/)?.[1] || e.from;
  try {
    const raw = btoa(unescape(encodeURIComponent(`To: ${fromEmail}\r\nSubject: Re: ${e.subject}\r\nContent-Type: text/plain; charset=utf-8\r\n\r\n${replyText}`))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: { raw } })
    });
    if (!res.ok) throw new Error('저장 실패');
    showToast(t('draftok'), 'success');
  } catch(err) { showToast(err.message, 'error'); }
}

async function fetchAllDrafts() {
  for (let i = 0; i < emails.length; i++) { if (!emails[i].reply) await generateReply(i); }
  showToast(`${emails.length}${t('alldraftok')}`, 'success');
}

function getInitial(from) { return cleanEmail(from).charAt(0).toUpperCase(); }
function cleanEmail(from) { return from.replace(/<.*>/, '').trim() || from; }
function formatDate(dateStr) { if (!dateStr) return ''; const d = new Date(dateStr); return `${d.getMonth()+1}/${d.getDate()}`; }
function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// OAuth 콜백 처리
function handleOAuthCallback() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) {
    accessToken = token;
    history.replaceState(null, '', window.location.pathname);
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('statusDot').className = 'status-dot connected';
    getUserInfo();
  }
}

handleOAuthCallback();
</script>
